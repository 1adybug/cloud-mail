name: Setup Resend DNS

on:
  workflow_dispatch:

jobs:
  setup-resend-dns:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ZONE_ID: b601498e76e904270b1a18adac08e61a

    steps:
      - name: Upsert Resend DNS records
        shell: bash
        run: |
          set -euo pipefail

          api() {
            local method="$1"
            local path="$2"
            local data="${3:-}"
            if [ -n "$data" ]; then
              curl -fsS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$data"
            else
              curl -fsS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json"
            fi
          }

          records='[
            {
              "type": "TXT",
              "name": "resend._domainkey.geshu.ai",
              "content": "p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDcNizregY8WD/BWwc7tHu9eoRWJQFNIBIilLmc1I6RYF0UH7FNyrMyPEr/SkJrg3LZ41dpT2P+GVmz2N0HSxp0PFJwwYvOIdMGCZmyzmYoVYnYxb3vk8FKjA1UxDL8a63zgfLYPLW0mEaoy1DricD/pMolnbc4iC5ePONlgxD9dQIDAQAB",
              "ttl": 1
            },
            {
              "type": "MX",
              "name": "send.geshu.ai",
              "content": "feedback-smtp.us-east-1.amazonses.com",
              "priority": 10,
              "ttl": 1
            },
            {
              "type": "TXT",
              "name": "send.geshu.ai",
              "content": "v=spf1 include:amazonses.com ~all",
              "ttl": 1
            },
            {
              "type": "TXT",
              "name": "_dmarc.geshu.ai",
              "content": "v=DMARC1; p=none;",
              "ttl": 1
            }
          ]'

          jq -c '.[]' <<<"$records" | while read -r record; do
            type="$(jq -r '.type' <<<"$record")"
            name="$(jq -r '.name' <<<"$record")"
            content="$(jq -r '.content' <<<"$record")"
            priority="$(jq -r '.priority // empty' <<<"$record")"
            query_name="$(jq -rn --arg v "$name" '$v|@uri')"
            existing="$(api GET "/zones/${ZONE_ID}/dns_records?type=${type}&name=${query_name}")"

            record_id="$(jq -r --arg content "$content" --arg priority "$priority" '
              .result[]?
              | select(.content == $content)
              | select(($priority == "") or ((.priority // "")|tostring == $priority))
              | .id
            ' <<<"$existing" | head -n 1)"

            if [ -n "$record_id" ]; then
              echo "DNS exists: ${type} ${name}"
              continue
            fi

            payload="$(jq -c '
              {type, name, content, ttl}
              + (if has("priority") then {priority} else {} end)
            ' <<<"$record")"

            update_id="$(jq -r '.result[0].id // empty' <<<"$existing")"
            if [ -n "$update_id" ]; then
              api PUT "/zones/${ZONE_ID}/dns_records/${update_id}" "$payload" >/dev/null
              echo "DNS updated: ${type} ${name}"
            else
              api POST "/zones/${ZONE_ID}/dns_records" "$payload" >/dev/null
              echo "DNS created: ${type} ${name}"
            fi
          done
