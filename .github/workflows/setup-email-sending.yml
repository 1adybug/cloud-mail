name: Setup Cloudflare Email Sending

on:
  workflow_dispatch:

jobs:
  setup-email-sending:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ZONE_ID: b601498e76e904270b1a18adac08e61a
      SENDING_DOMAIN: geshu.ai

    steps:
      - name: Enable Email Sending
        shell: bash
        run: |
          set -euo pipefail

          api() {
            local method="$1"
            local path="$2"
            local data="${3:-}"
            if [ -n "$data" ]; then
              curl -fsS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$data"
            else
              curl -fsS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json"
            fi
          }

          create_json="$(api POST "/zones/${ZONE_ID}/email/sending/subdomains" "$(jq -nc --arg name "$SENDING_DOMAIN" '{name:$name}')")"

          if [ "$(jq -r '.success' <<<"$create_json")" != "true" ]; then
            jq -c '{success, errors, messages}' <<<"$create_json"
            exit 1
          fi

          tag="$(jq -r '.result.tag' <<<"$create_json")"
          enabled="$(jq -r '.result.enabled' <<<"$create_json")"
          echo "Email Sending subdomain: $(jq -r '.result.name' <<<"$create_json")"
          echo "Enabled: ${enabled}"
          echo "Return path: $(jq -r '.result.return_path_domain' <<<"$create_json")"

          dns_json="$(api GET "/zones/${ZONE_ID}/email/sending/subdomains/${tag}/dns")"
          if [ "$(jq -r '.success' <<<"$dns_json")" != "true" ]; then
            jq -c '{success, errors, messages}' <<<"$dns_json"
            exit 1
          fi

          echo "Expected DNS records:"
          jq -r '.result[] | "- \(.type) \(.name) \(.content) priority=\(.priority // "-")"' <<<"$dns_json"

          echo "Cloudflare Email Sending setup completed."
