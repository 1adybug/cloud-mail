name: Configure Cloudflare Email Routing

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZONE_ID: b601498e76e904270b1a18adac08e61a
      WORKER_NAME: cloud-mail

    steps:
      - name: Configure Email Routing
        run: |
          set -euo pipefail

          api() {
            local method="$1"
            local path="$2"
            local body="${3:-}"
            if [ -n "$body" ]; then
              curl -sS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                --data "$body"
            else
              curl -sS -X "$method" "https://api.cloudflare.com/client/v4$path" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json"
            fi
          }

          summarize() {
            jq -c '{
              success,
              result: (
                if (.result | type) == "object" then
                  {
                    enabled: .result.enabled,
                    status: .result.status,
                    name: .result.name,
                    actions: .result.actions,
                    matchers: .result.matchers
                  }
                elif (.result | type) == "array" then
                  .result
                else
                  .result
                end
              ),
              errors: [.errors[]? | {code, message}]
            }'
          }

          echo "Checking current Email Routing settings..."
          settings="$(api GET "/zones/$ZONE_ID/email/routing")"
          echo "$settings" | summarize

          echo "Enabling Email Routing DNS records..."
          dns_enable="$(api POST "/zones/$ZONE_ID/email/routing/dns")"
          echo "$dns_enable" | summarize
          echo "$dns_enable" | jq -e '.success == true' >/dev/null

          echo "Configuring catch-all route to Worker..."
          catch_all_body="$(jq -nc --arg worker "$WORKER_NAME" '{
            enabled: true,
            name: "Catch-all to cloud-mail",
            matchers: [{ type: "all" }],
            actions: [{ type: "worker", value: [$worker] }]
          }')"
          catch_all="$(api PUT "/zones/$ZONE_ID/email/routing/rules/catch_all" "$catch_all_body")"
          echo "$catch_all" | summarize
          echo "$catch_all" | jq -e '.success == true' >/dev/null

          echo "Final Email Routing settings..."
          final_settings="$(api GET "/zones/$ZONE_ID/email/routing")"
          echo "$final_settings" | summarize
