name: Configure Resend for Cloud Mail

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      RESEND_TOKEN: ${{ secrets.TEMP_RESEND_TOKEN }}
      WORKER_URL: https://mail.geshu.ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./mail-worker/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker

      - name: Update Cloud Mail settings
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          echo "::add-mask::$RESEND_TOKEN"

          node <<'NODE'
          const required = [
            'CLOUDFLARE_API_TOKEN',
            'CLOUDFLARE_ACCOUNT_ID',
            'D1_DATABASE_ID',
            'JWT_SECRET',
            'RESEND_TOKEN',
            'WORKER_URL',
          ];

          for (const key of required) {
            if (!process.env[key]) {
              throw new Error(`${key} is missing`);
            }
          }

          const fs = require('node:fs');

          function sqlString(value) {
            return `'${String(value).replaceAll("'", "''")}'`;
          }

          fs.writeFileSync('wrangler-config.toml', [
            'name = "cloud-mail-config"',
            'main = "src/index.js"',
            'compatibility_date = "2025-06-04"',
            '',
            '[[d1_databases]]',
            'binding = "db"',
            'database_name = "cloud-mail"',
            `database_id = "${process.env.D1_DATABASE_ID}"`,
            '',
          ].join('\n'));

          fs.writeFileSync('configure-resend.sql', `
          UPDATE setting
          SET
            send = 1,
            resend_tokens = json_set(
              CASE
                WHEN resend_tokens IS NULL OR trim(resend_tokens) = '' OR NOT json_valid(resend_tokens) THEN '{}'
                ELSE resend_tokens
              END,
              '$."geshu.ai"',
              ${sqlString(process.env.RESEND_TOKEN)}
            );
          `);
          NODE

          pnpm wrangler d1 execute db --remote --config wrangler-config.toml --file configure-resend.sql -y

          node <<'NODE'
          const initUrl = `${process.env.WORKER_URL.replace(/\/$/, '')}/api/init/${process.env.JWT_SECRET}`;
          const initResponse = await fetch(initUrl);
          const initText = await initResponse.text();
          if (!initResponse.ok || initText.trim() !== 'success') {
            throw new Error(`Cloud Mail cache refresh failed: HTTP ${initResponse.status} ${initText}`);
          }
          console.log('Cloud Mail Resend settings updated and cache refreshed.');
          NODE
