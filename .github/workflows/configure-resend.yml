name: Configure Resend for Cloud Mail

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      RESEND_TOKEN: ${{ secrets.TEMP_RESEND_TOKEN }}
      WORKER_URL: https://mail.geshu.ai

    steps:
      - name: Update Cloud Mail settings
        run: |
          set -euo pipefail
          echo "::add-mask::$RESEND_TOKEN"

          node <<'NODE'
          const required = [
            'CLOUDFLARE_API_TOKEN',
            'CLOUDFLARE_ACCOUNT_ID',
            'D1_DATABASE_ID',
            'JWT_SECRET',
            'RESEND_TOKEN',
            'WORKER_URL',
          ];

          for (const key of required) {
            if (!process.env[key]) {
              throw new Error(`${key} is missing`);
            }
          }

          const endpoint = `https://api.cloudflare.com/client/v4/accounts/${process.env.CLOUDFLARE_ACCOUNT_ID}/d1/database/${process.env.D1_DATABASE_ID}/query`;
          const headers = {
            Authorization: `Bearer ${process.env.CLOUDFLARE_API_TOKEN}`,
            'Content-Type': 'application/json',
          };

          async function d1(sql, params = []) {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers,
              body: JSON.stringify({ sql, params }),
            });
            const body = await response.json();
            if (!response.ok || !body.success) {
              throw new Error(`D1 query failed: ${JSON.stringify(body.errors || body)}`);
            }
            return body.result;
          }

          const rows = await d1('SELECT resend_tokens FROM setting LIMIT 1');
          const current = rows?.[0]?.results?.[0]?.resend_tokens || '{}';
          let tokens = {};
          try {
            tokens = JSON.parse(current || '{}');
          } catch {
            tokens = {};
          }

          tokens['geshu.ai'] = process.env.RESEND_TOKEN;
          await d1('UPDATE setting SET send = 1, resend_tokens = ?', [JSON.stringify(tokens)]);

          const initUrl = `${process.env.WORKER_URL.replace(/\/$/, '')}/api/init/${process.env.JWT_SECRET}`;
          const initResponse = await fetch(initUrl);
          const initText = await initResponse.text();
          if (!initResponse.ok || initText.trim() !== 'success') {
            throw new Error(`Cloud Mail cache refresh failed: HTTP ${initResponse.status} ${initText}`);
          }

          console.log('Cloud Mail Resend settings updated and cache refreshed.');
          NODE
